<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Quickly</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/utils/variables.css">
  <link rel="stylesheet" href="/css/utils/base.css">
  <link rel="stylesheet" href="/css/utils/utilities.css">
  <link rel="stylesheet" href="/css/components/buttons.css">
  <link rel="stylesheet" href="/css/components/forms.css">
  <link rel="stylesheet" href="/css/pages/auth.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%234F46E5'/><text x='50%25' y='55%25' text-anchor='middle' dominant-baseline='middle' font-size='18' font-weight='bold' fill='white'>Q</text></svg>">
</head>
<body>
  <div class="auth-layout">
    <div class="auth-left">
      <div class="auth-left-content">
        <a href="/" class="d-flex items-center gap-3 mb-8" style="text-decoration:none">
          <div class="nav-logo">Q</div>
          <span class="font-bold text-2xl" style="color:white">Quickly</span>
        </a>
        <h1>Welcome Back</h1>
        <p>Log in to manage your deliveries, track parcels, and grow your business.</p>
        <div class="auth-features">
          <div class="auth-feature">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="M22 4L12 14.01l-3-3"/></svg>
            Real-time parcel tracking
          </div>
          <div class="auth-feature">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="M22 4L12 14.01l-3-3"/></svg>
            Analytics dashboard
          </div>
          <div class="auth-feature">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="M22 4L12 14.01l-3-3"/></svg>
            Instant notifications
          </div>
        </div>
      </div>
    </div>
    <div class="auth-right">
      <div class="auth-form-wrapper">
        <div class="auth-form-header">
          <h2>Sign In</h2>
          <p>Enter your credentials to access your account</p>
        </div>
        <form id="loginForm" class="auth-form">
          <div class="form-group">
            <label class="form-label">Email Address</label>
            <div class="input-group">
              <span class="input-group-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><path d="M22 6l-10 7L2 6"/></svg>
              </span>
              <input type="email" id="email" class="form-input" placeholder="you@example.com" required>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Password</label>
            <div class="input-group">
              <span class="input-group-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              </span>
              <input type="password" id="password" class="form-input" placeholder="Enter password" required>
              <button type="button" class="input-group-append btn btn-ghost btn-icon" onclick="togglePassword()" style="padding: 8px;">
                <svg id="eyeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
          </div>
          <div id="loginError" class="form-error" style="display:none; margin-bottom: 16px;"></div>
          <button type="submit" id="loginBtn" class="btn btn-primary btn-lg btn-block">
            Sign In
          </button>
        </form>
        <div class="auth-divider">
          <span>Demo Accounts</span>
        </div>
        <div class="demo-accounts">
          <button class="btn btn-outline btn-sm" onclick="fillDemo('shop@demo.com', 'demo123')">
            Shop Owner Demo
          </button>
          <button class="btn btn-outline btn-sm" onclick="fillDemo('driver@demo.com', 'demo123')">
            Driver Demo
          </button>
          <button class="btn btn-outline btn-sm" onclick="fillDemo('admin@quickly.com', 'admin123')">
            Admin Demo
          </button>
        </div>
        <p class="auth-footer-text">
          Don't have an account? <a href="/register">Create one now</a>
        </p>
      </div>
    </div>
  </div>

  <script src="/js/utils/api.js"></script>
  <script src="/js/utils/auth.js"></script>
  <script src="/js/utils/toast.js"></script>
  <script>
    // Redirect if already logged in
    if (Auth.isLoggedIn()) {
      Auth.redirectToDashboard();
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const errorEl = document.getElementById('loginError');
      errorEl.style.display = 'none';
      btn.classList.add('loading');
      btn.disabled = true;

      try {
        const res = await api.post('/auth/login', {
          email: document.getElementById('email').value,
          password: document.getElementById('password').value
        });

        if (res.success) {
          api.setToken(res.data.token);
          Auth.setUser(res.data.user);
          toast.success('Welcome back!', `Logged in as ${res.data.user.full_name}`);
          setTimeout(() => Auth.redirectToDashboard(), 500);
        }
      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.style.display = 'block';
      } finally {
        btn.classList.remove('loading');
        btn.disabled = false;
      }
    });

    function togglePassword() {
      const input = document.getElementById('password');
      input.type = input.type === 'password' ? 'text' : 'password';
    }

    function fillDemo(email, password) {
      document.getElementById('email').value = email;
      document.getElementById('password').value = password;
    }
  </script>
</body>
</html>
