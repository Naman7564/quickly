<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Quickly</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+Devanagari:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/utils/variables.css">
  <link rel="stylesheet" href="/css/utils/base.css">
  <link rel="stylesheet" href="/css/utils/utilities.css">
  <link rel="stylesheet" href="/css/components/buttons.css">
  <link rel="stylesheet" href="/css/components/forms.css">
  <link rel="stylesheet" href="/css/pages/auth.css">
  <link rel="stylesheet" href="/css/components/lang-switcher.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%234F46E5'/><text x='50%25' y='55%25' text-anchor='middle' dominant-baseline='middle' font-size='18' font-weight='bold' fill='white'>Q</text></svg>">
</head>
<body>
  <div class="auth-layout">
    <div class="auth-left">
      <div class="auth-left-content">
        <a href="/" class="d-flex items-center gap-3 mb-8" style="text-decoration:none">
          <div class="nav-logo">Q</div>
          <span class="font-bold text-2xl" style="color:white">Quickly</span>
        </a>
        <h1 data-i18n="auth.joinQuickly">Join Quickly</h1>
        <p data-i18n="auth.registerSubtitle">Create your account and start managing deliveries today.</p>
        <div class="auth-features">
          <div class="auth-feature">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="M22 4L12 14.01l-3-3"/></svg>
            <span data-i18n="auth.freeToStart">Free to get started</span>
          </div>
          <div class="auth-feature">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="M22 4L12 14.01l-3-3"/></svg>
            <span data-i18n="auth.noHiddenCharges">No hidden charges</span>
          </div>
          <div class="auth-feature">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="M22 4L12 14.01l-3-3"/></svg>
            <span data-i18n="auth.support247">24/7 support</span>
          </div>
        </div>
      </div>
    </div>
    <div class="auth-right">
      <a href="/" class="back-home">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5m0 0l7 7m-7-7l7-7"/></svg>
        <span data-i18n="auth.backToHome">Back to Home</span>
      </a>
      <div class="lang-switcher auth-lang" id="langSwitcher">
        <button class="lang-option active" data-lang="en">EN</button>
        <button class="lang-option" data-lang="hi">हिं</button>
        <div class="lang-slider"></div>
      </div>
      <div class="auth-form-wrapper">
        <div class="auth-form-header">
          <h2 data-i18n="auth.createAccount">Create Account</h2>
          <p data-i18n="auth.fillDetails">Fill in your details to get started</p>
        </div>

        <!-- Role Selection -->
        <div class="role-selector" id="roleSelector">
          <button class="role-option active" data-role="shop_owner" onclick="selectRole('shop_owner')">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><path d="M9 22V12h6v10"/></svg>
            <span data-i18n="auth.shopOwner">Shop Owner</span>
            <small data-i18n="auth.createDeliveries">Create deliveries</small>
          </button>
          <button class="role-option" data-role="driver" onclick="selectRole('driver')">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="3" width="15" height="13" rx="2"/><path d="M16 8h4a2 2 0 0 1 2 2v6a2 2 0 0 1-2 2h-4"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
            <span data-i18n="auth.deliveryDriver">Delivery Driver</span>
            <small data-i18n="auth.acceptDeliveries">Accept deliveries</small>
          </button>
        </div>

        <form id="registerForm" class="auth-form">
          <input type="hidden" id="role" value="shop_owner">

          <div class="form-row">
            <div class="form-group">
              <label class="form-label" data-i18n="auth.fullName">Full Name</label>
              <input type="text" id="full_name" class="form-input" placeholder="John Doe" data-i18n-placeholder="auth.namePlaceholder" required>
            </div>
            <div class="form-group">
              <label class="form-label" data-i18n="auth.phone">Phone</label>
              <input type="tel" id="phone" class="form-input" placeholder="9999999999" data-i18n-placeholder="auth.phonePlaceholder" required>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label" data-i18n="auth.emailAddress">Email Address</label>
            <input type="email" id="email" class="form-input" placeholder="you@example.com" data-i18n-placeholder="auth.emailPlaceholder" required>
          </div>

          <div class="form-group">
            <label class="form-label" data-i18n="auth.password">Password</label>
            <input type="password" id="password" class="form-input" placeholder="Min 6 characters" data-i18n-placeholder="auth.minChars" required minlength="6">
          </div>

          <!-- Shop Owner Fields -->
          <div id="shopFields">
            <div class="form-group">
              <label class="form-label" data-i18n="auth.shopName">Shop Name</label>
              <input type="text" id="shop_name" class="form-input" placeholder="Your shop name" data-i18n-placeholder="auth.shopNamePlaceholder">
            </div>
            <div class="form-row">
              <div class="form-group">
                <label class="form-label" data-i18n="auth.shopType">Shop Type</label>
                <select id="shop_type" class="form-select">
                  <option value="" data-i18n="auth.selectType">Select type</option>
                  <option value="General Store" data-i18n="auth.generalStore">General Store</option>
                  <option value="Restaurant" data-i18n="auth.restaurant">Restaurant</option>
                  <option value="Pharmacy" data-i18n="auth.pharmacy">Pharmacy</option>
                  <option value="Grocery" data-i18n="auth.grocery">Grocery</option>
                  <option value="Electronics" data-i18n="auth.electronicsStore">Electronics</option>
                  <option value="Clothing" data-i18n="auth.clothing">Clothing</option>
                  <option value="Other" data-i18n="auth.other">Other</option>
                </select>
              </div>
              <div class="form-group">
                <label class="form-label" data-i18n="auth.city">City</label>
                <input type="text" id="city" class="form-input" placeholder="Your city" data-i18n-placeholder="auth.cityPlaceholder">
              </div>
            </div>
          </div>

          <!-- Driver Fields -->
          <div id="driverFields" style="display:none;">
            <div class="form-row">
              <div class="form-group">
                <label class="form-label" data-i18n="auth.vehicleType">Vehicle Type</label>
                <select id="vehicle_type" class="form-select">
                  <option value="auto" data-i18n="auth.autoRickshaw">Auto Rickshaw</option>
                  <option value="lorry" data-i18n="auth.cargoLorry">Cargo Lorry</option>
                  <option value="bike" data-i18n="auth.bike">Bike</option>
                  <option value="van" data-i18n="auth.miniVan">Mini Van</option>
                </select>
              </div>
              <div class="form-group">
                <label class="form-label" data-i18n="auth.vehicleNumber">Vehicle Number</label>
                <input type="text" id="vehicle_number" class="form-input" placeholder="KA-01-AB-1234" data-i18n-placeholder="auth.vehiclePlaceholder">
              </div>
            </div>
            <div class="form-group">
              <label class="form-label" data-i18n="auth.licenseNumber">License Number</label>
              <input type="text" id="license_number" class="form-input" placeholder="Your license number" data-i18n-placeholder="auth.licensePlaceholder">
            </div>
          </div>

          <div id="registerError" class="form-error" style="display:none; margin-bottom: 16px;"></div>

          <button type="submit" id="registerBtn" class="btn btn-primary btn-lg btn-block" data-i18n="auth.createAccount">
            Create Account
          </button>
        </form>

        <p class="auth-footer-text">
          <span data-i18n="auth.alreadyHaveAccount">Already have an account?</span> <a href="/login" data-i18n="auth.signInLink">Sign in</a>
        </p>
      </div>
    </div>
  </div>

  <script src="/js/utils/i18n.js"></script>
  <script src="/js/utils/api.js"></script>
  <script src="/js/utils/auth.js"></script>
  <script src="/js/utils/toast.js"></script>
  <script>
    if (Auth.isLoggedIn()) Auth.redirectToDashboard();

    // Check URL params for role
    const params = new URLSearchParams(window.location.search);
    if (params.get('role') === 'driver') selectRole('driver');

    function selectRole(role) {
      document.getElementById('role').value = role;
      document.querySelectorAll('.role-option').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.role === role);
      });
      document.getElementById('shopFields').style.display = role === 'shop_owner' ? 'block' : 'none';
      document.getElementById('driverFields').style.display = role === 'driver' ? 'block' : 'none';
    }

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('registerBtn');
      const errorEl = document.getElementById('registerError');
      errorEl.style.display = 'none';
      btn.classList.add('loading');
      btn.disabled = true;

      try {
        const body = {
          email: document.getElementById('email').value,
          password: document.getElementById('password').value,
          full_name: document.getElementById('full_name').value,
          phone: document.getElementById('phone').value,
          role: document.getElementById('role').value
        };

        if (body.role === 'shop_owner') {
          body.shop_name = document.getElementById('shop_name').value;
          body.shop_type = document.getElementById('shop_type').value;
          body.city = document.getElementById('city').value;
        } else {
          body.vehicle_type = document.getElementById('vehicle_type').value;
          body.vehicle_number = document.getElementById('vehicle_number').value;
          body.license_number = document.getElementById('license_number').value;
        }

        const res = await api.post('/auth/register', body);

        if (res.success) {
          api.setToken(res.data.token);
          Auth.setUser(res.data.user);
          toast.success(i18n.t('toast.accountCreated'), i18n.t('toast.welcomeToQuickly'));
          setTimeout(() => Auth.redirectToDashboard(), 500);
        }
      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.style.display = 'block';
      } finally {
        btn.classList.remove('loading');
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
